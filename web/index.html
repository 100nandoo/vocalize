<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocalize — Gemini TTS</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">🔊</div>
        <span class="logo-name">Vocalize</span>
        <span class="logo-badge">Gemini TTS</span>
      </div>
      <span class="pill">24 kHz · PCM-16</span>
    </header>

    <!-- Content -->
    <main>

      <!-- OCR card -->
      <div class="card" id="ocr-card">
        <div class="info-row">
          <span class="pill">Image OCR</span>
          <span class="ocr-hint">Extract text from an image</span>
        </div>

        <div class="drop-zone" id="drop-zone">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <p>Drop an image here, or <label for="file-input" class="file-label">browse</label></p>
          <span class="drop-hint" id="drop-hint">PNG, JPEG, WebP, TIFF supported</span>
          <input type="file" id="file-input" accept="image/*" hidden />
        </div>

        <div id="ocr-result" hidden>
          <textarea id="ocr-text" readonly rows="6" placeholder="Extracted text will appear here…"></textarea>
          <div class="ocr-actions">
            <button id="ocr-copy-btn" class="btn-secondary">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
                <path d="M16 1H4C2.9 1 2 1.9 2 3v14h2V3h12V1zm3 4H8C6.9 5 6 5.9 6 7v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
              </svg>
              <span id="ocr-copy-label">Copy</span>
            </button>
            <button id="ocr-synthesize-btn" class="btn-primary">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z"/>
              </svg>
              Synthesize
            </button>
          </div>
        </div>
      </div>

      <!-- Input card -->
      <div class="card">
        <div class="info-row">
          <span class="pill">Model</span>
          <div class="select-wrap select-wrap-sm">
            <select id="model-select" title="Select TTS model"></select>
          </div>
        </div>

        <div class="textarea-wrap">
          <textarea
            id="text-input"
            placeholder="Enter text to synthesize…"
            rows="4"
          ></textarea>
        </div>

        <!-- Controls -->
        <div class="controls">
          <!-- Gender filter -->
          <div class="select-wrap">
            <select id="gender-filter" title="Filter by gender">
              <option value="All">All voices</option>
              <option value="Female">Female</option>
              <option value="Male">Male</option>
            </select>
          </div>

          <!-- Voice dropdown (populated by app.js) -->
          <div class="select-wrap">
            <select id="voice-select" title="Select voice"></select>
          </div>

          <!-- Synthesize button -->
          <button id="synthesize-btn" class="btn-primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <span id="synthesize-label">Synthesize</span>
          </button>

          <!-- Speak button -->
          <button id="speak-btn" class="btn-secondary" disabled title="Play synthesized audio">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <span>Speak</span>
          </button>

          <!-- Download button -->
          <button id="download-btn" class="btn-secondary" disabled title="Download last audio">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
            </svg>
            Download
          </button>

          <!-- Playing indicator -->
          <div class="playing-bar" id="playing-bar">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
          </div>

          <!-- Status text -->
          <span class="status-text" id="status-text"></span>
        </div>
      </div>

      <!-- Activity feed -->
      <div class="card">
        <p class="feed-header">Activity</p>
        <div class="feed" id="feed">
          <p class="feed-empty" id="feed-empty">No activity yet — hit Speak to get started.</p>
        </div>
      </div>

    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
