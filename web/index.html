<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inti — Gemini TTS</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">🔊</div>
        <span class="logo-name">Inti</span>
        <span class="logo-badge">Gemini TTS</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <a href="/api-keys.html" class="header-settings-link" title="Manage API keys">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
          </svg>
          API Keys
        </a>
        <a href="/settings.html" class="header-settings-link" title="Summarizer settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Settings
        </a>
      </div>
    </header>

    <!-- Content -->
    <main>

      <!-- OCR card -->
      <div class="card" id="ocr-card">
        <div class="info-row">
          <span class="pill">Image OCR</span>
          <span class="ocr-hint">Extract text from an image</span>
        </div>

        <div class="drop-zone" id="drop-zone">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <p>Drop images here, or <label for="file-input" class="file-label">browse</label></p>
          <span class="drop-hint" id="drop-hint">PNG, JPEG, WebP, TIFF · select multiple</span>
          <input type="file" id="file-input" accept="image/*" multiple hidden />
        </div>

        <div id="file-staging" hidden>
          <ul id="file-list"></ul>
          <div class="staging-actions">
            <button id="clear-files-btn" class="btn-secondary">Clear</button>
            <button id="run-ocr-btn" class="btn-primary">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
              Extract Text
            </button>
          </div>
        </div>

        <div id="ocr-result" hidden>
          <div class="ocr-actions">
            <div class="select-wrap">
              <select id="provider-select" title="Summarizer provider">
                <option value="">Server default</option>
              </select>
            </div>
            <div class="select-wrap" id="sum-model-wrap" hidden>
              <select id="sum-model-select" title="Summarizer model"></select>
            </div>
            <button id="summarize-btn" class="btn-secondary" title="Summarize extracted text">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
                <path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/>
              </svg>
              <span>Summarize</span>
            </button>
            <button id="summarize-speak-btn" class="btn-secondary" title="Summarize and speak">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
                <path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/>
              </svg>
              <span>Summarize + Speak</span>
            </button>
          </div>
        </div>

        <!-- Summary result -->
        <div id="summary-result" hidden>
          <div id="summary-text" class="summary-markdown"></div>
          <div class="summary-actions">
            <button id="summary-copy-btn" class="btn-secondary">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
                <path d="M16 1H4C2.9 1 2 1.9 2 3v14h2V3h12V1zm3 4H8C6.9 5 6 5.9 6 7v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
              </svg>
              <span id="summary-copy-label">Copy</span>
            </button>
            <button id="summary-speak-btn" class="btn-primary">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z"/>
              </svg>
              Speak
            </button>
          </div>
        </div>
      </div>

      <!-- Input card -->
      <div class="card">
        <div class="info-row">
          <span class="pill">Model</span>
          <div class="select-wrap select-wrap-sm">
            <select id="model-select" title="Select TTS model"></select>
          </div>
          <span class="pill audio-spec">24 kHz · PCM-16</span>
        </div>

        <div class="textarea-wrap">
          <textarea
            id="text-input"
            placeholder="Enter text to synthesize…"
            rows="4"
          ></textarea>
        </div>

        <!-- Controls -->
        <div class="controls">
          <!-- Gender filter -->
          <div class="select-wrap">
            <select id="gender-filter" title="Filter by gender">
              <option value="All">All voices</option>
              <option value="Female">Female</option>
              <option value="Male">Male</option>
            </select>
          </div>

          <!-- Voice dropdown (populated by app.js) -->
          <div class="select-wrap">
            <select id="voice-select" title="Select voice"></select>
          </div>

          <!-- Action checkboxes + submit -->
          <div class="action-checkboxes">
            <label class="action-check"><input type="checkbox" id="action-synthesize" checked> Synthesize</label>
            <label class="action-check"><input type="checkbox" id="action-speak"> Speak</label>
            <label class="action-check"><input type="checkbox" id="action-download"> Download</label>
            <label class="action-check"><input type="checkbox" id="action-summarize"> Summarize</label>
          </div>
          <button id="submit-btn" class="btn-primary">Submit</button>

          <!-- Playing indicator -->
          <div class="playing-bar" id="playing-bar">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
          </div>

          <!-- Status text -->
          <span class="status-text" id="status-text"></span>
        </div>
      </div>

      <!-- Activity feed -->
      <div class="card">
        <p class="feed-header">Activity</p>
        <div class="feed" id="feed">
          <p class="feed-empty" id="feed-empty">No activity yet — hit Speak to get started.</p>
        </div>
      </div>

    </main>
  </div>

  <!-- Image preview modal -->
  <div id="img-preview-modal" hidden>
    <div id="img-preview-backdrop"></div>
    <div id="img-preview-box">
      <img id="img-preview-img" src="" alt="Preview" />
      <button id="img-preview-close" title="Close">×</button>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
