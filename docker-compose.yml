version: '3.8'

services:
  vocalize:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Load from .env file
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - VOCALIZE_CONFIG_DIR=/app/config
      - HOST=0.0.0.0
    env_file:
      - path: .env
        required: false
    volumes:
      - ./config:/app/config
      # Optional: mount web directory for development
      # - ./web:/app/web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
